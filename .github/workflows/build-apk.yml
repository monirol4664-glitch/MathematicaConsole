name: Build Python IDE APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      # FIX 1: Use Java 17 for Android SDK compatibility
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      # FIX 2: Setup Android SDK with correct versions
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34'
          accept-android-sdk-licenses: true
      
      # FIX 3: Create proper Android project structure
      - name: Create Android project
        run: |
          # Create directories
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/java/com/app
          mkdir -p app/src/main/res/values
          
          # Copy source files
          cp index.html app/src/main/assets/
          cp MainActivity.java app/src/main/java/com/app/
          cp AndroidManifest.xml app/src/main/
          
          # Create styles.xml
          cat > app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="android:Theme.Holo">
              </style>
          </resources>
          EOF
      
      # FIX 4: Create Gradle files with correct versions
      - name: Create Gradle files
        run: |
          # Root build.gradle
          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.3.1'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          task clean(type: Delete) {
              delete rootProject.buildDir
          }
          EOF
          
          # App build.gradle
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          
          android {
              compileSdk 33
              
              defaultConfig {
                  applicationId "com.app"
                  minSdk 21
                  targetSdk 33
                  versionCode 1
                  versionName "1.0"
              }
              
              buildTypes {
                  debug {
                      debuggable true
                  }
              }
              
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          EOF
          
          # Settings.gradle
          echo 'include ":app"' > settings.gradle
          
          # gradle.properties
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx1536m
          android.useAndroidX=false
          android.enableJetifier=false
          EOF
      
      # FIX 5: Setup Gradle Wrapper correctly
      - name: Setup Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          
          # Download gradle-wrapper.jar directly
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            https://github.com/gradle/gradle/raw/v7.5.0/gradle/wrapper/gradle-wrapper.jar
          
          # Create gradle-wrapper.properties
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-7.5-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          
          # Create gradlew script
          cat > gradlew << 'EOF'
          #!/bin/sh
          APP_NAME="Gradle"
          APP_BASE_NAME=`basename "$0"`
          CLASSPATH=$APP_HOME/gradle/wrapper/gradle-wrapper.jar
          exec java $JAVA_OPTS -cp "$CLASSPATH" org.gradle.wrapper.GradleWrapperMain "$@"
          EOF
          
          chmod +x gradlew
      
      # FIX 6: Build APK with proper gradle execution
      - name: Build APK
        run: |
          # Make gradlew executable
          chmod +x gradlew
          
          # Clean and build
          ./gradlew clean
          ./gradlew assembleDebug --no-daemon
          
          # Verify APK was created
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            APK_SIZE=$(du -h app/build/outputs/apk/debug/app-debug.apk | cut -f1)
            echo "✅ APK built successfully! Size: $APK_SIZE"
            ls -la app/build/outputs/apk/debug/
          else
            echo "❌ APK build failed"
            exit 1
          fi
      
      # FIX 7: Upload the APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Python-IDE
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30