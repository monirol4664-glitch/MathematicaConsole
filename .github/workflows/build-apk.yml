name: Build Mathematica Console APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          openjdk-17-jdk \
          build-essential \
          git \
          zip \
          unzip \
          curl \
          wget \
          libssl-dev \
          libffi-dev \
          python3-dev \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev
    
    - name: Install Android SDK manually
      run: |
        # Create Android SDK directory
        mkdir -p $HOME/.buildozer/android/platform/android-sdk
        export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
        export ANDROID_SDK_ROOT=$ANDROID_HOME
        
        # Download Android command line tools
        cd $HOME/.buildozer/android/platform
        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip
        mkdir -p $ANDROID_HOME/cmdline-tools
        mv cmdline-tools $ANDROID_HOME/cmdline-tools/latest
        
        # Set PATH
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
        
        # Accept licenses automatically
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1
        
        # Install required SDK components
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-30" "build-tools;30.0.3" "build-tools;33.0.0"
        
        echo "Android SDK installed successfully"
        
    - name: Setup environment variables
      run: |
        echo "ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk" >> $GITHUB_ENV
        echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
        echo "PATH=$PATH:$HOME/.buildozer/android/platform/android-sdk/platform-tools:$HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin:$HOME/.buildozer/android/platform/android-sdk/build-tools/30.0.3" >> $GITHUB_ENV
    
    - name: Verify aidl installation
      run: |
        # Check if aidl exists
        if [ -f "$HOME/.buildozer/android/platform/android-sdk/build-tools/30.0.3/aidl" ]; then
          echo "Aidl found at: $HOME/.buildozer/android/platform/android-sdk/build-tools/30.0.3/aidl"
          $HOME/.buildozer/android/platform/android-sdk/build-tools/30.0.3/aidl --version
        elif [ -f "$HOME/.buildozer/android/platform/android-sdk/build-tools/33.0.0/aidl" ]; then
          echo "Aidl found at: $HOME/.buildozer/android/platform/android-sdk/build-tools/33.0.0/aidl"
          $HOME/.buildozer/android/platform/android-sdk/build-tools/33.0.0/aidl --version
        else
          echo "Searching for aidl..."
          find $HOME/.buildozer -name "aidl" 2>/dev/null
          exit 1
        fi
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --user buildozer cython
        pip install --user kivy==2.2.1 kivymd==1.1.1 sympy==1.12 mpmath==1.3.0 matplotlib==3.7.2 numpy==1.24.3 pillow==10.0.1
    
    - name: Create project structure
      run: |
        mkdir -p src/mathematica_console/resources
        mkdir -p src/mathematica_console
        
        # Create __init__.py
        cat > src/mathematica_console/__init__.py << 'EOF'
        __version__ = "1.0.0"
        __author__ = "Mathematica Console"
        
        from .main import main
        __all__ = ['main']
        EOF
        
        # Create main.py
        cat > src/mathematica_console/main.py << 'EOF'
        from kivy.app import App
        from kivy.uix.boxlayout import BoxLayout
        from kivy.uix.textinput import TextInput
        from kivy.uix.label import Label
        from kivy.uix.button import Button
        from kivy.uix.scrollview import ScrollView
        from kivy.uix.gridlayout import GridLayout
        from kivy.core.window import Window
        import sympy as sp
        
        class ConsoleApp(App):
            def build(self):
                Window.size = (400, 700)
                Window.clearcolor = (0.1, 0.1, 0.12, 1)
                
                main_layout = BoxLayout(orientation='vertical')
                
                # Output area
                self.output = ScrollView()
                self.output_layout = GridLayout(cols=1, size_hint_y=None)
                self.output_layout.bind(minimum_height=self.output_layout.setter('height'))
                self.output.add_widget(self.output_layout)
                
                # Input area
                input_layout = BoxLayout(size_hint_y=0.15)
                self.input = TextInput(hint_text="Enter expression...", multiline=False)
                submit = Button(text="Evaluate", size_hint_x=0.2)
                submit.bind(on_press=self.evaluate)
                
                input_layout.add_widget(self.input)
                input_layout.add_widget(submit)
                
                main_layout.add_widget(self.output)
                main_layout.add_widget(input_layout)
                
                return main_layout
            
            def evaluate(self, instance):
                expr = self.input.text
                if expr.strip():
                    try:
                        result = sp.sympify(expr)
                        result_label = Label(text=f"In: {expr}\nOut: {result}\n", 
                                            size_hint_y=None, height=60,
                                            halign='left', valign='top')
                        result_label.bind(size=result_label.setter('text_size'))
                        self.output_layout.add_widget(result_label)
                        self.input.text = ""
                    except Exception as e:
                        error_label = Label(text=f"Error: {str(e)}", color=(1,0,0,1),
                                          size_hint_y=None, height=40)
                        self.output_layout.add_widget(error_label)
        
        if __name__ == '__main__':
            ConsoleApp().run()
        EOF
    
    - name: Create buildozer.spec
      run: |
        cat > buildozer.spec << 'EOF'
        [app]
        
        title = Mathematica Console
        package.name = mathemaconsole
        package.domain = org.mathematica
        version = 1.0.0
        
        source.dir = src/mathematica_console
        requirements = python3,kivy==2.2.1,sympy==1.12
        
        android.permissions = INTERNET
        android.api = 30
        android.minapi = 21
        android.ndk = 23b
        android.sdk = 30
        android.archs = armeabi-v7a, arm64-v8a
        
        android.orientation = portrait
        fullscreen = 0
        log_level = 2
        debug = 0
        
        [buildozer]
        
        log_level = 2
        android.accept_sdk_license = True
        EOF
    
    - name: Build APK
      run: |
        # Initialize buildozer
        buildozer init
        
        # Build with specific Android SDK path
        export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
        export ANDROID_SDK_ROOT=$ANDROID_HOME
        export PATH=$PATH:$ANDROID_HOME/build-tools/30.0.3:$ANDROID_HOME/platform-tools
        
        # Build APK
        buildozer -v android debug 2>&1 | tee build.log
    
    - name: Find and upload APK
      run: |
        # Find APK file
        APK_FILE=$(find . -name "*.apk" -type f | head -n 1)
        if [ -n "$APK_FILE" ]; then
          echo "APK found: $APK_FILE"
          cp "$APK_FILE" mathematica-console.apk
          ls -lh mathematica-console.apk
        else
          echo "No APK found. Checking buildozer directory..."
          ls -la bin/ 2>/dev/null || echo "bin directory not found"
          ls -la .buildozer/ 2>/dev/null || echo "buildozer directory not found"
          exit 1
        fi
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: mathematica-console
        path: mathematica-console.apk
        if-no-files-found: error
    
    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
