name: Build Mathematica Console APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          openjdk-17-jdk \
          build-essential \
          git \
          zip \
          unzip \
          curl \
          wget \
          libssl-dev \
          libffi-dev \
          python3-dev \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev
    
    - name: Install Android SDK manually
      run: |
        # Create Android SDK directory
        mkdir -p $HOME/.buildozer/android/platform/android-sdk
        export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
        
        # Download Android command line tools
        cd $HOME/.buildozer/android/platform
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip
        mkdir -p $ANDROID_HOME/cmdline-tools
        mv cmdline-tools $ANDROID_HOME/cmdline-tools/latest
        
        # Accept licenses
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
        
        # Install required SDK components
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-30" "build-tools;30.0.3" > /dev/null 2>&1
        
        echo "Android SDK installed successfully"
        
    - name: Setup environment variables
      run: |
        echo "ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk" >> $GITHUB_ENV
        echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
        echo "PATH=$PATH:$HOME/.buildozer/android/platform/android-sdk/platform-tools:$HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin:$HOME/.buildozer/android/platform/android-sdk/build-tools/30.0.3" >> $GITHUB_ENV
    
    - name: Verify aidl installation
      run: |
        # Check if aidl exists
        if [ -f "$ANDROID_HOME/build-tools/30.0.3/aidl" ]; then
          echo "✅ Aidl found at: $ANDROID_HOME/build-tools/30.0.3/aidl"
          # Just check if file exists and is executable
          file $ANDROID_HOME/build-tools/30.0.3/aidl
          echo "Aidl is ready to use"
        else
          echo "❌ Aidl not found"
          find $ANDROID_HOME -name "aidl" 2>/dev/null
          exit 1
        fi
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --user buildozer cython
        pip install --user kivy==2.2.1 kivymd==1.1.1 sympy==1.12 mpmath==1.3.0
    
    - name: Create minimal working app
      run: |
        mkdir -p src/mathematica_console
        
        # Create __init__.py
        cat > src/mathematica_console/__init__.py << 'EOF'
        __version__ = "1.0.0"
        EOF
        
        # Create main.py with working app
        cat > src/mathematica_console/main.py << 'EOF'
        """
        Mathematica Console - Offline Symbolic Math App
        """
        from kivy.app import App
        from kivy.uix.boxlayout import BoxLayout
        from kivy.uix.textinput import TextInput
        from kivy.uix.label import Label
        from kivy.uix.button import Button
        from kivy.uix.scrollview import ScrollView
        from kivy.core.window import Window
        import sympy as sp
        
        class MathematicaConsole(App):
            def build(self):
                Window.size = (400, 700)
                Window.clearcolor = (0.1, 0.1, 0.12, 1)
                
                # Main layout
                main_layout = BoxLayout(orientation='vertical', padding=10, spacing=10)
                
                # Title
                title = Label(text='Mathematica Console', size_hint_y=0.1, font_size='20sp', color=(0.8, 0.8, 0.9, 1))
                main_layout.add_widget(title)
                
                # Output area (scrollable)
                self.output_container = ScrollView(size_hint_y=0.7)
                self.output_layout = BoxLayout(orientation='vertical', size_hint_y=None)
                self.output_layout.bind(minimum_height=self.output_layout.setter('height'))
                self.output_container.add_widget(self.output_layout)
                main_layout.add_widget(self.output_container)
                
                # Input area
                input_layout = BoxLayout(size_hint_y=0.15, spacing=10)
                self.input = TextInput(hint_text='Enter expression (e.g., 2+2, x**2, integrate(x**2, x))', multiline=False)
                self.input.bind(on_text_validate=self.evaluate)
                submit_btn = Button(text='Evaluate', size_hint_x=0.25)
                submit_btn.bind(on_press=self.evaluate)
                clear_btn = Button(text='Clear', size_hint_x=0.15)
                clear_btn.bind(on_press=self.clear_output)
                
                input_layout.add_widget(self.input)
                input_layout.add_widget(submit_btn)
                input_layout.add_widget(clear_btn)
                main_layout.add_widget(input_layout)
                
                # Add welcome message
                self.add_output("Welcome to Mathematica Console!", info=True)
                self.add_output("Examples:", info=True)
                self.add_output("  • 2 + 2", info=True)
                self.add_output("  • x**2 + 3*x + 2", info=True)
                self.add_output("  • integrate(x**2, x)", info=True)
                self.add_output("  • diff(sin(x), x)", info=True)
                self.add_output("  • solve(x**2 - 4, x)", info=True)
                self.add_output("", info=True)
                
                return main_layout
            
            def add_output(self, text, error=False, info=False):
                """Add output to the console"""
                if error:
                    color = (1, 0.3, 0.3, 1)
                elif info:
                    color = (0.5, 0.8, 0.5, 1)
                else:
                    color = (0.9, 0.9, 0.9, 1)
                
                output_label = Label(
                    text=text,
                    size_hint_y=None,
                    height=40,
                    halign='left',
                    valign='top',
                    color=color,
                    font_size='14sp'
                )
                output_label.bind(size=output_label.setter('text_size'))
                self.output_layout.add_widget(output_label)
                
                # Scroll to bottom
                self.output_container.scroll_y = 0
            
            def evaluate(self, instance):
                """Evaluate mathematical expression"""
                expr_text = self.input.text.strip()
                if not expr_text:
                    return
                
                # Show input
                self.add_output(f"In: {expr_text}")
                
                try:
                    # Parse and evaluate using sympy
                    expr = sp.sympify(expr_text)
                    result = sp.simplify(expr)
                    
                    # Format result
                    result_str = str(result)
                    if len(result_str) > 100:
                        result_str = result_str[:100] + "..."
                    
                    self.add_output(f"Out: {result_str}")
                    
                except Exception as e:
                    self.add_output(f"Error: {str(e)}", error=True)
                
                # Clear input
                self.input.text = ""
            
            def clear_output(self, instance):
                """Clear all output"""
                self.output_layout.clear_widgets()
                self.add_output("Console cleared", info=True)
        
        if __name__ == '__main__':
            MathematicaConsole().run()
        EOF
    
    - name: Create buildozer.spec
      run: |
        cat > buildozer.spec << 'EOF'
        [app]
        
        title = Mathematica Console
        package.name = mathemaconsole
        package.domain = org.mathematica
        version = 1.0.0
        
        source.dir = src/mathematica_console
        requirements = python3,kivy==2.2.1,sympy==1.12
        
        android.permissions = INTERNET
        android.api = 30
        android.minapi = 21
        android.ndk = 23b
        android.sdk = 30
        android.archs = armeabi-v7a, arm64-v8a
        
        android.orientation = portrait
        fullscreen = 0
        window.size = (400, 700)
        
        log_level = 2
        debug = 0
        warn_on_root = 1
        
        [buildozer]
        
        log_level = 2
        warn_on_root = 1
        android.accept_sdk_license = True
        EOF
    
    - name: Build APK
      run: |
        # Clean previous builds
        rm -rf .buildozer bin
        
        # Build APK
        buildozer android debug 2>&1 | tee build.log
    
    - name: Find APK
      run: |
        # Find the generated APK
        APK_PATH=$(find . -name "*.apk" -type f | head -n 1)
        if [ -n "$APK_PATH" ]; then
          echo "APK_FOUND=true" >> $GITHUB_ENV
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
          cp "$APK_PATH" mathematica-console.apk
          ls -lh mathematica-console.apk
        else
          echo "APK_FOUND=false" >> $GITHUB_ENV
          echo "No APK found. Checking directories..."
          ls -la bin/ 2>/dev/null || echo "No bin directory"
          ls -la .buildozer/ 2>/dev/null || echo "No .buildozer directory"
        fi
    
    - name: Upload APK
      if: env.APK_FOUND == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: mathematica-console
        path: mathematica-console.apk
        if-no-files-found: ignore
    
    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
        if-no-files-found: ignore
    
    - name: Build summary
      if: always()
      run: |
        echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
        if [ "${{ env.APK_FOUND }}" = "true" ]; then
          echo "✅ **APK built successfully!**" >> $GITHUB_STEP_SUMMARY
          echo "- File: mathematica-console.apk" >> $GITHUB_STEP_SUMMARY
          echo "- Size: $(ls -lh mathematica-console.apk | awk '{print $5}')" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ **Build failed**" >> $GITHUB_STEP_SUMMARY
          echo "Check the build log for details." >> $GITHUB_STEP_SUMMARY
        fi
