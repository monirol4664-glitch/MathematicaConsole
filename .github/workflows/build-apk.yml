name: Build Jupyter-Style IDE APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool
        pip install --upgrade cython buildozer
    
    - name: Build APK with Buildozer
      uses: ArtemSBulgakov/buildozer-action@v2
      id: buildozer
      with:
        command: buildozer android debug
        buildozer_version: stable
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: jupyter-ide-apk
        path: ${{ steps.buildozer.outputs.filename }}
        if-no-files-found: error
        compression-level: 6
        overwrite: true
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ steps.buildozer.outputs.filename }}
        generate_release_notes: true
