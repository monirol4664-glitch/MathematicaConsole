name: Build Python IDE APK (Simple)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34'
          accept-android-sdk-licenses: true
      
      - name: Create project
        run: |
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/java/com/app
          mkdir -p app/src/main/res/values
          
          cp index.html app/src/main/assets/
          cp MainActivity.java app/src/main/java/com/app/
          cp AndroidManifest.xml app/src/main/
          
          cat > app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="android:Theme.Holo"></style>
          </resources>
          EOF
          
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:7.3.1' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          android {
              compileSdk 33
              defaultConfig {
                  applicationId "com.app"
                  minSdk 21
                  targetSdk 33
                  versionCode 1
                  versionName "1.0"
              }
          }
          EOF
          
          echo 'include ":app"' > settings.gradle
      
      - name: Install gradle
        run: |
          sudo apt-get update
          sudo apt-get install -y gradle
      
      - name: Build APK
        run: |
          gradle clean
          gradle assembleDebug
          
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "✅ APK built!"
            ls -lh app/build/outputs/apk/debug/
          fi
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Python-IDE
          path: app/build/outputs/apk/debug/*.apk