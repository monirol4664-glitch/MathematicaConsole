name: Build Python APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev cmake libffi-dev libssl-dev
      
      - uses: android-actions/setup-android@v3
      
      - name: Install buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython
      
      - name: Create buildozer.spec
        run: |
          echo '[app]' > buildozer.spec
          echo 'title = Python Console' >> buildozer.spec
          echo 'package.name = pythonconsole' >> buildozer.spec
          echo 'package.domain = org.pythonapp' >> buildozer.spec
          echo 'source.dir = .' >> buildozer.spec
          echo 'version = 1.0.0' >> buildozer.spec
          echo 'version.code = 1' >> buildozer.spec
          echo 'requirements = python3,kivy' >> buildozer.spec
          echo 'orientation = portrait' >> buildozer.spec
          echo 'fullscreen = 0' >> buildozer.spec
          echo 'android.api = 30' >> buildozer.spec
          echo 'android.sdk = 30' >> buildozer.spec
          echo 'android.ndk = 23b' >> buildozer.spec
          echo 'android.allow_backup = True' >> buildozer.spec
          echo 'android.permissions = WRITE_EXTERNAL_STORAGE' >> buildozer.spec
          echo 'android.debug = True' >> buildozer.spec
          echo '' >> buildozer.spec
          echo '[buildozer]' >> buildozer.spec
          echo 'log_level = 2' >> buildozer.spec
          echo 'warn_on_root = 1' >> buildozer.spec
      
      - name: Show spec file
        run: cat buildozer.spec
      
      - name: Build APK
        run: buildozer android debug
        timeout-minutes: 30
      
      - uses: actions/upload-artifact@v4
        with:
          name: python-app-apk
          path: bin/*.apk
