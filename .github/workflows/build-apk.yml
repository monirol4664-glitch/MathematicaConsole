name: Build Mathematica Console APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install complete Android build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          openjdk-17-jdk \
          android-sdk \
          build-essential \
          git \
          zip \
          unzip \
          curl \
          wget \
          libssl-dev \
          libffi-dev \
          python3-dev \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          libltdl-dev \
          libtool \
          autoconf \
          automake \
          cmake \
          ninja-build \
          pkg-config \
          libxml2-dev \
          libxslt1-dev
        
        # Install aidl specifically
        sudo apt-get install -y aidl || true
        
        # If aidl not available via apt, download it
        if ! command -v aidl &> /dev/null; then
          echo "Installing aidl manually..."
          sudo wget -O /usr/bin/aidl https://raw.githubusercontent.com/aosp-mirror/platform_frameworks_base/master/tools/aidl/aidl
          sudo chmod +x /usr/bin/aidl
        fi
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade buildozer cython kivy kivymd sympy mpmath matplotlib numpy pillow
    
    - name: Setup Android SDK environment
      run: |
        # Set Android SDK paths
        echo "ANDROID_HOME=/usr/lib/android-sdk" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=/usr/lib/android-sdk" >> $GITHUB_ENV
        echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
        
        # Add SDK tools to PATH
        echo "$ANDROID_HOME/tools/bin" >> $GITHUB_PATH
        echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
        echo "$ANDROID_HOME/emulator" >> $GITHUB_PATH
        echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
        
        # Accept Android licenses
        mkdir -p $ANDROID_HOME/licenses
        echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_HOME/licenses/android-sdk-license
        echo "84831b9409646a918e30573bab4c9c91346d8abd" > $ANDROID_HOME/licenses/android-sdk-preview-license
        
        # Install required SDK components
        sudo apt-get install -y android-sdk-platform-23 || true
        
    - name: Create version file
      run: |
        mkdir -p src/mathematica_console
        echo '__version__ = "1.0.0"' > src/mathematica_console/__init__.py
        echo '__author__ = "Your Name"' >> src/mathematica_console/__init__.py
    
    - name: Create buildozer spec
      run: |
        cat > buildozer.spec << 'EOF'
        [app]
        
        title = Mathematica Console
        package.name = mathemaconsole
        package.domain = org.mathematica
        version = 1.0.0
        
        source.dir = src/mathematica_console
        requirements = python3,kivy==2.2.1,kivymd==1.1.1,sympy==1.12,mpmath==1.3.0,matplotlib==3.7.2,numpy==1.24.3,pillow==10.0.1
        
        android.permissions = INTERNET,WRITE_EXTERNAL_STORAGE,READ_EXTERNAL_STORAGE
        android.api = 30
        android.minapi = 21
        android.ndk = 23b
        android.sdk = 30
        android.archs = armeabi-v7a, arm64-v8a
        
        android.orientation = portrait
        fullscreen = 0
        window.size = (400, 700)
        
        log_level = 2
        debug = 0
        warn_on_root = 1
        
        [buildozer]
        
        log_level = 2
        warn_on_root = 1
        android.accept_sdk_license = True
        EOF
    
    - name: Initialize buildozer
      run: |
        buildozer init || true
    
    - name: Build APK with debug output
      run: |
        # Clean previous builds
        rm -rf .buildozer bin
        
        # Build with verbose output
        buildozer -v android debug 2>&1 | tee build.log
    
    - name: Check if APK was created
      run: |
        if [ -f bin/*.apk ]; then
          echo "APK created successfully!"
          ls -lh bin/
        else
          echo "APK not found. Checking build.log for errors..."
          tail -100 build.log
          exit 1
        fi
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: mathematica-console-apk
        path: ./bin/*.apk
        if-no-files-found: error
    
    - name: Upload build log (if build fails)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
