name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Install dependencies
      run: npm install
    
    - name: Build React app
      run: npm run build
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Create Android project
      run: |
        mkdir -p android/app/src/main/assets
        mkdir -p android/app/src/main/java/com/mathapp
        cp -r build/* android/app/src/main/assets/
    
    - name: Create Android files
      run: |
        cat > android/app/src/main/AndroidManifest.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.mathapp.pro">
            <uses-permission android:name="android.permission.INTERNET" />
            <application android:allowBackup="true" android:icon="@mipmap/ic_launcher" android:label="MathMaster" android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                <activity android:name=".MainActivity" android:configChanges="orientation|screenSize" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF
        
        cat > android/app/src/main/java/com/mathapp/MainActivity.java << 'EOF'
        package com.mathapp.pro;
        import android.os.Bundle;
        import android.webkit.WebView;
        import android.webkit.WebViewClient;
        import androidx.appcompat.app.AppCompatActivity;
        public class MainActivity extends AppCompatActivity {
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                WebView webView = new WebView(this);
                webView.setWebViewClient(new WebViewClient());
                webView.getSettings().setJavaScriptEnabled(true);
                webView.loadUrl("file:///android_asset/index.html");
                setContentView(webView);
            }
        }
        EOF
        
        cat > android/build.gradle << 'EOF'
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:7.4.2' }
        }
        EOF
        
        cat > android/app/build.gradle << 'EOF'
        apply plugin: 'com.android.application'
        android {
            compileSdk 33
            defaultConfig {
                applicationId "com.mathapp.pro"
                minSdk 21
                targetSdk 33
                versionCode 1
                versionName "1.0"
            }
            buildTypes { release { minifyEnabled false } }
        }
        dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
        EOF
        
        echo 'include ":app"' > android/settings.gradle
    
    - name: Build APK
      run: |
        cd android
        wget https://services.gradle.org/distributions/gradle-7.5-bin.zip
        unzip -q gradle-7.5-bin.zip
        GRADLE_HOME=$PWD/gradle-7.5
        export PATH=$GRADLE_HOME/bin:$PATH
        gradle wrapper --gradle-version 7.5
        chmod +x gradlew
        ./gradlew assembleRelease --no-daemon
        cd ..
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: MathMaster-App
        path: android/app/build/outputs/apk/release/*.apk