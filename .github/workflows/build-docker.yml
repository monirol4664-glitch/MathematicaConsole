name: Build APK (Alternative)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Build APK
      uses: digreatbrian/buildozer-action@v2
      with:
        workdir: .
        buildozer_version: stable
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: jupyter-ide-apk
        path: ./bin/*.apk