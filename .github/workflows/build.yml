name: Build Mathematica Console APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET 9
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
    
    - name: Install Android Workload
      run: dotnet workload install android
    
    - name: Restore dependencies
      run: dotnet restore MathematicaConsole.csproj
    
    - name: Build Android APK
      run: dotnet publish MathematicaConsole.csproj -c Release -f net9.0-android35 /p:AndroidPackageFormat=apk
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: MathematicaConsole-APK
        path: bin/Release/net9.0-android35/*.apk
