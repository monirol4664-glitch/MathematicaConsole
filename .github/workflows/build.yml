name: Build with .NET 9

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET 9
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
    
    - name: Install Android Workload
      run: dotnet workload install android
    
    - name: Create and Build APK
      run: |
        dotnet new android -n MathematicaConsole
        cd MathematicaConsole
        
        # Update to .NET 9
        sed -i 's/net[0-9.]*-android/net9.0-android35/' MathematicaConsole.csproj
        
        # THIS creates the APK (not just build)
        dotnet publish -c Release -f net9.0-android35 /p:AndroidPackageFormat=apk
        
        # Find where the APK is
        find . -name "*.apk"
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: MathematicaConsole.apk
        path: |
          **/bin/Release/net9.0-android35/*.apk
          **/publish/*.apk
          **/*.apk
