name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'  # Use .NET 8 instead of 9/10
    
    - name: Install Android Workload
      run: dotnet workload install android
    
    - name: Build APK
      run: |
        dotnet new android -n MathematicaConsole
        cd MathematicaConsole
        # Fix the Android version mismatch
        sed -i 's/<TargetFramework>net[0-9.]*-android/<TargetFramework>net8.0-android33.0/' MathematicaConsole.csproj
        sed -i 's/<SupportedOSPlatformVersion>[0-9]*/<SupportedOSPlatformVersion>21/' MathematicaConsole.csproj
        dotnet build -c Release
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: MathematicaConsole.apk
        path: MathematicaConsole/bin/Release/net8.0-android/*.apk
