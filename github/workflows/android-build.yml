name: Android Build & Release

on:
  push:
    branches: [ "main", "release/*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:  # Manual trigger

env:
  main_module: app

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3  # Auto-installs SDK [web:57]

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrappers
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: ${{ runner.os }}-gradle-

    - name: Accept licenses
      run: |
        yes | sdkmanager --licenses > /dev/null

    - name: Setup Gradle Wrapper Permissions
      run: chmod +x ./gradlew

    - name: Clean Project
      run: ./gradlew clean

    - name: Build Debug APK
      run: ./gradlew ${{ env.main_module }}:assembleDebug

    - name: Build Release APK
      run: ./gradlew ${{ env.main_module }}:assembleRelease

    - name: Build Release AAB
      run: ./gradlew ${{ env.main_module }}:bundleRelease

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk-${{ github.run_number }}
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 7

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: release-apk-${{ github.run_number }}
        path: app/build/outputs/apk/release/*.apk
        retention-days: 30

    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: release-aab-${{ github.run_number }}
        path: app/build/outputs/bundle/release/*.aab
        retention-days: 30

  # Optional: Play Store upload (add secrets later)
